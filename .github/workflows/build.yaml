name: Build, Package and Release

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  pull_request:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build theme
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Package theme
        id: package
        run: |
          VERSION=$(grep -m1 '^Version:' style.css | cut -d: -f2 | tr -d ' ')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          mkdir -p /tmp/scam-dev
          cp -r . /tmp/scam-dev/
          cd /tmp/scam-dev
          rm -rf node_modules .git .gitverse vendor plugins wp-content \
            Makefile docker-compose.yml .dockerignore \
            composer.* postcss.config.js webpack.config.js \
            package.json package-lock.json \
            .gitignore .eslintrc.json .config.json .env \
            .dockerignore inc/search-bar.php \
            start.sh PROJECT.md project-info.sh \
            assets/js/main.js assets/js/app.js \
            assets/js/components assets/scss *.zip
          mkdir -p assets/css assets/js
          mv build/*.css assets/css/
          mv build/app.js assets/js/
          rm -rf build
          find . -type d -exec chmod 755 {} \;
          find . -type f -exec chmod 644 {} \;
          cd /tmp
          zip -r ${GITHUB_WORKSPACE}/scam-dev-${VERSION}.zip scam-dev/ > /dev/null
          rm -rf /tmp/scam-dev

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: scam-dev-${{ steps.package.outputs.version }}
          path: scam-dev-*.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: scam-dev-${{ needs.build.outputs.version }}
          path: ./dist

      - name: Get version info
        id: version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges > CHANGELOG_BODY.md
          else
            git log --pretty=format:"- %s" --no-merges > CHANGELOG_BODY.md
          fi
          echo "Changelog:"
          cat CHANGELOG_BODY.md

      - name: Read changelog into env
        run: |
          {
            echo 'CHANGELOG<<EOF'
            cat CHANGELOG_BODY.md
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Scam Dev v${{ steps.version.outputs.version }}"
          body: |
            ## Изменения в v${{ steps.version.outputs.version }}

            ${{ env.CHANGELOG }}
          files: ./dist/scam-dev-*.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
