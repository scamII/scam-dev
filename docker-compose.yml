services:
  mysql:
    image: mysql:8.0
    container_name: scam-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  wordpress:
    image: wordpress:latest
    container_name: scam-dev-wordpress
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "true"
    volumes:
      - wordpress_data:/var/www/html
      - type: bind
        source: .
        target: /var/www/html/wp-content/themes/scam-dev
    ports:
      - "8080:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: scam-dev-pma
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_CONTROLHOST: mysql
      PMA_CONTROLUSER: pma
      PMA_CONTROLPASS: scam-dev-pma-secure
    ports:
      - "8081:80"

volumes:
  mysql_data:
  wordpress_data:
